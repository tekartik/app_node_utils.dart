name: tekartik_app_node_build_menu
description: Build menu for nodes app (google cloud and aliyun)
version: 1.0.0
publish_to: none
# homepage: https://www.example.com

environment:
  sdk: ^3.12.0

dependencies:
  path: ">=1.9.1"
  args: ">=2.7.0"
  dev_build: ">=1.1.7+3"
  process_run: ">=1.2.1+1"
  tekartik_app_node_build:
    git:
      url: https://github.com/tekartik/app_node_utils.dart
      path: app_build
    version: '>=0.1.0'
  tekartik_build_node:
    git:
      url: https://github.com/tekartik/build_node.dart
      path: packages/build_node

dev_dependencies:
  # Needed direct dependencies
  build_runner: ">=2.15.0"
  build_web_compilers: ">=4.4.19"
  lints: ">=6.1.0"
  test: ">=1.31.0"

executables:
  nbm: nbm
resolution: workspace
